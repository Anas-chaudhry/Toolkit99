<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
<title>Toolkit99</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="css/main.css">
</head>
<body>

<!-- PAGE LOADER -->
<div id="pageLoader" class="page-loader">
  <div class="pl-card">
    <div class="pl-logo">
      <span class="logo-toolkit">Toolkit</span><span class="logo-99">99</span>
    </div>
    <div class="pl-spinner-ring">
      <svg viewBox="0 0 48 48" fill="none">
        <circle cx="24" cy="24" r="20" stroke="var(--border)" stroke-width="3"/>
        <circle cx="24" cy="24" r="20" stroke="var(--amber)" stroke-width="3"
          stroke-dasharray="31 95" stroke-linecap="round" class="pl-arc"/>
      </svg>
    </div>
    <div class="pl-label">Loading tools<span class="pl-dots"><span>.</span><span>.</span><span>.</span></span></div>
  </div>
</div>

<!-- TOPBAR -->
<div class="topbar">
  <div class="tb-logo">
    <span class="logo-toolkit">Toolkit</span><span class="logo-99">99</span>
  </div>
  <div class="tb-mid">
    <div class="tb-tab active" data-filter="all">All</div>
    <div class="tb-tab" data-filter="free">Free</div>
    <div class="tb-tab" data-filter="paid">Pro</div>
  </div>
  <div class="tb-right">
    <div class="notif-wrap">
      <div class="notif-btn" id="notifBtn">
        <i class="fa-solid fa-bell"></i>
        <span class="notif-dot" id="notifDot"></span>
      </div>
    </div>
  </div>
</div>

<!-- ═══ NOTIFICATION MODAL ════════════════════════ -->
<div class="notif-modal-backdrop" id="notifModalBackdrop">
  <div class="notif-modal" id="notifModal">
    <div class="nm-header">
      <div class="nm-title">Notifications</div>
      <button class="nm-close-btn" id="nmCloseBtn">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>

    <!-- chips with counts -->
    <div class="nm-chips" id="nmChips">
      <div class="nm-chip active" data-nfilter="all">
        All <span class="nm-chip-count" id="chipCountAll">0</span>
      </div>
      <div class="nm-chip" data-nfilter="unread">
        Unread <span class="nm-chip-count" id="chipCountUnread">0</span>
      </div>
      <div class="nm-chip" data-nfilter="read">
        Read <span class="nm-chip-count" id="chipCountRead">0</span>
      </div>
    </div>

    <div class="nm-mark-row">
      <span class="nm-mark-all" id="markAllBtn">
        <i class="fa-solid fa-check-double"></i> Mark all as read
      </span>
    </div>

    <div class="nm-list" id="notifList"></div>
  </div>
</div>

<!-- MAIN WRAPPER -->
<div class="wrapper">

  <div class="head-stats">
    <div class="hst">
      <div class="hst-icon"><i class="fa-solid fa-layer-group"></i></div>
      <div class="hst-info">
        <div class="hst-num" id="statTotal">—</div>
        <div class="hst-lbl">Total</div>
      </div>
    </div>
    <div class="hst">
      <div class="hst-icon" style="color:var(--green)"><i class="fa-solid fa-circle-check"></i></div>
      <div class="hst-info">
        <div class="hst-num" id="statFree" style="color:var(--green)">—</div>
        <div class="hst-lbl">Free</div>
      </div>
    </div>
    <div class="hst">
      <div class="hst-icon" style="color:var(--amber)"><i class="fa-solid fa-crown"></i></div>
      <div class="hst-info">
        <div class="hst-num" id="statPaid" style="color:var(--amber)">—</div>
        <div class="hst-lbl">Pro</div>
      </div>
    </div>
  </div>

  <!-- Search + filter-sort btn -->
  <div class="controls-row">
    <div class="search-wrap">
      <i class="fa-solid fa-magnifying-glass search-icon"></i>
      <input type="text" id="searchInput" placeholder="Search tools by name, tag..." autocomplete="off">
      <!-- Change 5: inline result chip -->
      <div class="search-result-chip" id="searchResultChip" style="display:none"></div>
    </div>

    <div class="filtersort-wrap" id="filtersortWrap">
      <div class="filtersort-btn" id="filtersortBtn">
        <i class="fa-solid fa-sliders" id="filtersortIcon"></i>
        <i class="fa-solid fa-xmark"   id="filtersortClose" style="display:none"></i>
        <span class="fs-active-dot"></span>
      </div>
      <div class="filtersort-dropdown" id="filtersortDropdown">

        <div class="fsd-section-label">Filter</div>
        <div class="fsd-option active" data-fsd-type="filter" data-value="all">
          <i class="fa-solid fa-border-all"></i> All Tools
          <i class="fa-solid fa-check fsd-check"></i>
        </div>
        <div class="fsd-option" data-fsd-type="filter" data-value="free">
          <i class="fa-solid fa-circle-check"></i> Free Only
          <i class="fa-solid fa-check fsd-check"></i>
        </div>
        <div class="fsd-option" data-fsd-type="filter" data-value="paid">
          <i class="fa-solid fa-crown"></i> Pro Only
          <i class="fa-solid fa-check fsd-check"></i>
        </div>

        <div class="fsd-divider"></div>
        <div class="fsd-section-label">Sort</div>

        <div class="fsd-option active" data-fsd-type="sort" data-value="newest">
          <i class="fa-solid fa-arrow-down-wide-short"></i> Newest First
          <i class="fa-solid fa-check fsd-check"></i>
        </div>
        <div class="fsd-option" data-fsd-type="sort" data-value="oldest">
          <i class="fa-solid fa-arrow-up-wide-short"></i> Oldest First
          <i class="fa-solid fa-check fsd-check"></i>
        </div>
        <div class="fsd-option" data-fsd-type="sort" data-value="az">
          <i class="fa-solid fa-arrow-down-a-z"></i> A → Z
          <i class="fa-solid fa-check fsd-check"></i>
        </div>
        <div class="fsd-option" data-fsd-type="sort" data-value="za">
          <i class="fa-solid fa-arrow-up-z-a"></i> Z → A
          <i class="fa-solid fa-check fsd-check"></i>
        </div>
      </div>
    </div>
  </div>

  <!-- list header hidden — counter now inside search input -->
  <div class="list-header" style="display:none">
    <div class="list-count" id="listCount"></div>
  </div>

  <div class="accordion" id="acc"></div>
</div>

<!-- IFRAME OVERLAY -->
<div id="iframeOverlay">
  <div class="iframe-topbar">
    <div class="iframe-back" id="iframeBackBtn"><i class="fa-solid fa-arrow-left"></i></div>
    <div class="iframe-title" id="iframeTitle">Tool</div>
    <div class="iframe-url"   id="iframeUrlEl"></div>
  </div>
  <iframe id="toolIframe" src="" allowfullscreen></iframe>
</div>

<!-- PAID MODAL -->
<div class="modal-backdrop" id="paidModal">
  <div class="modal">
    <div class="modal-icon-ring">
      <i class="fa-solid fa-lock" style="color:var(--amber)"></i>
    </div>
    <h2>Pro Tool</h2>
    <p><strong id="paidModalName"></strong> is a paid tool.<br>Contact admin on WhatsApp to get access.</p>
    <button class="modal-wa-btn" id="modalWaBtn">
      <i class="fa-brands fa-whatsapp" style="font-size:1.1rem"></i>
      Contact on WhatsApp
    </button>
    <button class="modal-close-btn" id="modalCloseBtn">Maybe Later</button>
  </div>
</div>

<!-- FLOAT WHATSAPP -->
<a class="float-wa" id="floatWa" href="#" target="_blank" rel="noopener">
  <i class="fa-brands fa-whatsapp"></i>
</a>

<!-- TOAST -->
<div class="toast" id="toastEl"></div>



<script src="js/app.js"></script>
</body>
</html>
